input {
  beats {
    port => 5044
  }
  
  tcp {
    port => 5000
    codec => json
  }
  
  udp {
    port => 5000
    codec => json
  }
  
  file {
    path => "/var/log/app/*.log"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb"
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^{.*}$/ {
    json {
      source => "message"
      remove_field => ["message"]
    }
  }
  
  # Parse application logs
  if [type] == "application" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:logger} - %{LOGLEVEL:level} - %{GREEDYDATA:log_message}" 
      }
    }
    
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
  
  # Parse nginx logs
  if [type] == "nginx" {
    grok {
      match => { 
        "message" => "%{IP:client_ip} - %{DATA:remote_user} \[%{HTTPDATE:timestamp}\] \"%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}\" %{NUMBER:status} %{NUMBER:body_bytes_sent} \"%{DATA:http_referer}\" \"%{DATA:http_user_agent}\" rt=%{NUMBER:request_time} uct=%{NUMBER:upstream_connect_time} uht=%{NUMBER:upstream_header_time} urt=%{NUMBER:upstream_response_time}" 
      }
    }
    
    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }
    
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
  
  # Parse Python logs
  if [type] == "python" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:logger} - %{LOGLEVEL:level} - %{GREEDYDATA:log_message} - %{DATA:filename}:%{NUMBER:lineno}" 
      }
    }
    
    mutate {
      add_field => {
        "service" => "backend"
      }
    }
  }
  
  # Parse Node.js logs
  if [type] == "nodejs" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:level} - %{GREEDYDATA:log_message}" 
      }
    }
    
    mutate {
      add_field => {
        "service" => "frontend"
      }
    }
  }
  
  # Add trace ID for distributed tracing
  if [trace_id] {
    mutate {
      add_field => {
        "[@metadata][trace_id]" => "%{trace_id}"
      }
    }
  }
  
  # Add service name
  if [service] {
    mutate {
      add_field => {
        "service_name" => "%{service}"
      }
    }
  }
  
  # Clean up fields
  mutate {
    remove_field => ["message", "path", "host", "@version"]
  }
}

output {
  # Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
    ssl => true
    ssl_certificate_verification => false
  }
  
  # Console for debugging
  stdout {
    codec => rubydebug
  }
  
  # Prometheus metrics
  if [level] == "ERROR" or [status] >= 500 {
    prometheus {
      action => "increment"
      metric => "log_errors_total"
      labels => ["service", "level", "status"]
    }
  }
}